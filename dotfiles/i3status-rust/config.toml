[[block]]
block = "battery"
device = "BAT0"
format = " $icon $percentage "
full_format = " $icon $percentage "
interval = 30

[[block]]
block = "time"
interval = 60
[block.format]
full = " $icon $timestamp.datetime(f:'%a %d %b %Y %R') "
short = " $timestamp.datetime(f:'%a %d/%m %R') "
