[theme]
theme = "plain"

[icons]
icons = "awesome6"

[[block]]
block = "net"
format = " $icon {$ssid|Ethernet} "
interval = 5

[[block]]
block = "sound"
format = " $icon {$volume} $output_name "
click = [{button = "left", action = "toggle_mute"}]
max_vol = 100
show_volume_when_muted = true
headphones_indicator = true
[block.mappings]
"alsa_output.pci-0000_00_1f.3.analog-stereo" = ""

[[block]]
block = "bluetooth"
mac = "80:C3:BA:81:4E:79"
format = " 󰋋 {$percentage|} "
disconnected_format = " 󰋎 "

[[block]]
block = "bluetooth"
mac = "C8:44:09:2D:79:DA"
format = " 󰍽 {$percentage|} "
disconnected_format = " 󰍾 "

